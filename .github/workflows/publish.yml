name: Fast Publish (No Keys, No Cost)

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Local Docker Build and OIDC Publish
    runs-on: self-hosted

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.19.1

      - name: Build pyPSX Wheels (Inside Docker)
        env:
          CIBW_TEST_SKIP: "*"
        run: python -m cibuildwheel --platform linux ./pypsx --output-dir dist/

      - name: Build pyTrader Wheels (Inside Docker)
        env:
          CIBW_TEST_SKIP: "*"
        run: python -m cibuildwheel --platform linux ./pytrader --output-dir dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

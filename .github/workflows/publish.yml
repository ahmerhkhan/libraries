name: Fast Publish (No Keys, No Cost)

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Local Docker Build and OIDC Publish
    runs-on: self-hosted # <--- This tells GitHub to use the terminal you opened in Step 1

    permissions:
      id-token: write # <--- This generates the PyPI security token (No API key needed!)
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.19.1

      - name: Build pyPSX Wheels (Inside Docker)
        env:
          CIBW_TEST_SKIP: "*" # <--- This stops the Pandas freeze!
        # cibuildwheel automatically detects Docker on your machine and uses it
        run: python -m cibuildwheel ./pypsx --output-dir dist/

      - name: Build pyTrader Wheels (Inside Docker)
        env:
          CIBW_TEST_SKIP: "*"
        run: python -m cibuildwheel ./pytrader --output-dir dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Automatically uses the OIDC token generated by GitHub
          packages-dir: dist/

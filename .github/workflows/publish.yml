name: Publish to PyPI

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows — ${{ matrix.package.name }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: pypsx
            python_build: "cp39-* cp310-* cp311-* cp312-*"
          - name: pytrader
            python_build: "cp310-* cp311-* cp312-*"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.19.1
      - name: Build Windows wheels
        run: python -m cibuildwheel --platform windows ./${{ matrix.package.name }} --output-dir dist/
        env:
          CIBW_BUILD: ${{ matrix.package.python_build }}
          CIBW_SKIP: "*-win32"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_BEFORE_BUILD: 'pip install "cython>=3.0" setuptools wheel'
          CIBW_TEST_SKIP: "*"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.package.name }}
          path: dist/*.whl

  publish-pypsx:
    name: Publish pypsx to PyPI
    needs: [build-windows]
    runs-on: ubuntu-latest
    environment: pypi-pypsx
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "wheels-windows-pypsx"
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  publish-pytrader:
    name: Publish pytrader-sdk to PyPI
    needs: [build-windows]
    runs-on: ubuntu-latest
    environment: pypi-pytrader
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "wheels-windows-pytrader"
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

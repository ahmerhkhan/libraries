name: Fast Publish (Self-Hosted, No Keys)

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build-and-publish:
    name: Build & Publish on Self-Hosted Runner
    runs-on: self-hosted
    permissions:
      id-token: write   # Required for OIDC trusted publishing
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.19.1

      - name: Build pypsx wheels
        env:
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_BEFORE_BUILD: 'python -m pip install "Cython>=3.0" "setuptools>=68" wheel'
          CIBW_TEST_SKIP: "*"
        run: python -m cibuildwheel ./pypsx --output-dir dist/

      - name: Build pytrader wheels
        env:
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_BEFORE_BUILD: 'python -m pip install "Cython>=3.0" "setuptools>=68" wheel'
          CIBW_TEST_SKIP: "*"
        run: python -m cibuildwheel ./pytrader --output-dir dist/

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
